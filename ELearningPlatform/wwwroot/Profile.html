<!DOCTYPE html>
<html lang='en'>
<head>
  <meta charset='UTF-8'>
  <meta name='viewport' content='width=device-width, initial-scale=1.0'>
  <title>Profile — E-Learning</title>
  <link rel='stylesheet' href='https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css'>
  <link rel='stylesheet' href='style.css'>
</head>
<body>
<header>
  <h2 class='text-center'>E-Learning Platform</h2>
  <nav class='nav justify-content-center'>
    <a href='Dashboard.html'>Dashboard</a>
    <a href='Courses.html'>Courses</a>
    <a href='Quiz.html'>Quiz</a>
    <a href='Profile.html'>Profile</a>
    <a href='#' class='nav-logout' onclick='logout()'>Logout</a>
  </nav>
</header>
<main>
  <div class='container mt-4'>
    <p class='breadcrumb'><a href='Dashboard.html'>Home</a> &gt; Profile</p>
    <h2 class='page-title'>Student Profile</h2>
    <div class='profile-wrapper'>
      <div class='profile-card'>
        <div class='profile-avatar'>👤</div>
        <!-- View mode -->
        <div id='profileView'>
          <h3 id='pName'>Loading…</h3>
          <p id='pEmail' class='text-muted'></p>
          <p id='pJoined' class='text-muted small'></p>
          <button class='complete-btn mt-3' onclick='editProfile()'>Edit Profile</button>
        </div>
        <!-- Edit mode -->
        <div id='profileEdit' style='display:none'>
          <div class='mb-3'>
            <label class='form-label fw-bold'>Full Name</label>
            <input type='text' id='editName' class='form-control'>
          </div>
          <div class='mb-3'>
            <label class='form-label fw-bold'>Email (read-only)</label>
            <input type='email' id='editEmail' class='form-control' readonly>
          </div>
          <div class='d-flex gap-2'>
            <button class='complete-btn' onclick='saveProfile()'>Save Changes</button>
            <button class='done-btn' onclick='cancelEdit()' style='background:#95a5a6'>Cancel</button>
          </div>
        </div>
        <div id='profileMsg' class='auth-msg mt-3' style='display:none'></div>
      </div>
      <div class='profile-card completed-card'>
        <h3>Courses Completed</h3>
        <div class='profile-completed-count' id='completedCount'>0</div>
        <p class='stat-lbl'>Completed Courses</p>
      </div>
    </div>
  </div>
</main>
<footer class='text-center mt-5 p-3 bg-light'><p>© 2026 E-Learning Platform</p></footer>
<script src='profile.js'></script>
</body>
</html>
